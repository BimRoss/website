name: Build BimRoss Website Image

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  IMAGE_NAME: geeemoney/bimross-website

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=build,enable=${{ !startsWith(github.ref, 'refs/tags/') }}

      - name: Validate GA measurement ID for tagged releases
        if: startsWith(github.ref, 'refs/tags/')
        env:
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ vars.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
        run: |
          if [ -z "${NEXT_PUBLIC_GA_MEASUREMENT_ID}" ]; then
            echo "NEXT_PUBLIC_GA_MEASUREMENT_ID repository variable is required for tagged builds."
            exit 1
          fi

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            NEXT_PUBLIC_GA_MEASUREMENT_ID=${{ vars.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Ping IndexNow
        if: startsWith(github.ref, 'refs/tags/v')
        continue-on-error: true
        env:
          INDEXNOW_KEY: 741c9ef6851fd271b7341196720ef97d
          SITE_HOST: bimross.com
        run: |
          # IndexNow notifies Bing/Yandex/Naver/Seznam (and via api.indexnow.org,
          # any aggregator that proxies to them) of changed URLs. The key file at
          # https://${SITE_HOST}/${INDEXNOW_KEY}.txt proves ownership.
          # Best-effort — never fail the release on a push hiccup.
          SITEMAP_URLS=$(curl -sS --max-time 10 "https://${SITE_HOST}/sitemap.xml" \
            | grep -oE '<loc>[^<]+</loc>' | sed -E 's,</?loc>,,g')
          if [ -z "${SITEMAP_URLS}" ]; then
            echo "No URLs in sitemap; skipping IndexNow ping."
            exit 0
          fi
          URL_LIST=$(printf '%s\n' ${SITEMAP_URLS} | jq -R . | jq -s .)
          PAYLOAD=$(jq -n \
            --arg host "${SITE_HOST}" \
            --arg key "${INDEXNOW_KEY}" \
            --arg keyLocation "https://${SITE_HOST}/${INDEXNOW_KEY}.txt" \
            --argjson urlList "${URL_LIST}" \
            '{host:$host, key:$key, keyLocation:$keyLocation, urlList:$urlList}')
          echo "Pinging IndexNow with $(echo "${URL_LIST}" | jq 'length') URLs."
          curl -sS -X POST "https://api.indexnow.org/indexnow" \
            --max-time 15 \
            -H "Content-Type: application/json" \
            -d "${PAYLOAD}" \
            -w "\nHTTP %{http_code}\n" || true

  gitops-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs:
      - build-and-publish
    env:
      RANCHER_ADMIN_REPO: bimross/rancher-admin
    steps:
      - name: Compute release version
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Checkout rancher-admin
        uses: actions/checkout@v6
        with:
          repository: ${{ env.RANCHER_ADMIN_REPO }}
          ref: master
          token: ${{ secrets.RANCHER_ADMIN_REPO_TOKEN }}
          path: rancher-admin
          fetch-depth: 0

      - name: Update bimross-website image tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          import re

          version = os.environ["VERSION"]
          path = Path("rancher-admin/admin/apps/bimross-website/deployment.yaml")
          content = path.read_text()
          pattern = r"(geeemoney/bimross-website:)[^\s\"']+"
          updated = re.sub(pattern, lambda m: f"{m.group(1)}{version}", content)
          path.write_text(updated)
          PY

      - name: Commit manifest updates to PR branch
        id: commit
        working-directory: rancher-admin
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if git diff --quiet; then
            echo "No manifest changes to commit."
            echo "changed=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          git config user.name "bimross-website-ci"
          git config user.email "bimross-website-ci@users.noreply.github.com"
          MSG="release(bimross-website): bump image to ${VERSION}"
          BRANCH="gitops/bimross-website-${VERSION}"
          # Idempotent branch: if a prior run created it, reset and force-push so
          # the PR reflects the latest manifest. Branch name embeds version, so
          # collisions only happen on workflow reruns for the same tag.
          git checkout -B "${BRANCH}"
          git add admin/apps/bimross-website/deployment.yaml
          git commit -m "${MSG}"
          git push --force-with-lease origin "${BRANCH}"
          echo "changed=true" >> "${GITHUB_OUTPUT}"
          echo "branch=${BRANCH}" >> "${GITHUB_OUTPUT}"
          echo "title=${MSG}" >> "${GITHUB_OUTPUT}"

      - name: Open or update PR and enable auto-merge
        if: steps.commit.outputs.changed == 'true'
        working-directory: rancher-admin
        env:
          GH_TOKEN: ${{ secrets.RANCHER_ADMIN_REPO_TOKEN }}
          BRANCH: ${{ steps.commit.outputs.branch }}
          TITLE: ${{ steps.commit.outputs.title }}
          VERSION: ${{ steps.version.outputs.version }}
          SOURCE_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          BODY=$(printf '%s\n' \
            "Automated GitOps bump from \`${GITHUB_REPOSITORY}\`." \
            "" \
            "- version: \`${VERSION}\`" \
            "- image: \`geeemoney/bimross-website:${VERSION}\`" \
            "- source run: ${SOURCE_RUN_URL}" \
            "" \
            "Org ruleset on \`master\` requires PR review." \
            "Auto-merge (squash) is enabled; PR will merge once approvals land.")
          EXISTING=$(gh pr list --head "${BRANCH}" --state open --json number --jq '.[0].number' || true)
          if [ -n "${EXISTING}" ]; then
            echo "Reusing existing PR #${EXISTING} for branch ${BRANCH}."
            PR_NUMBER="${EXISTING}"
            gh pr edit "${PR_NUMBER}" --title "${TITLE}" --body "${BODY}" || true
          else
            gh pr create \
              --base master \
              --head "${BRANCH}" \
              --title "${TITLE}" \
              --body "${BODY}"
            PR_NUMBER=$(gh pr list --head "${BRANCH}" --state open --json number --jq '.[0].number')
            echo "Created PR #${PR_NUMBER}."
          fi
          if gh pr merge "${PR_NUMBER}" --squash --auto; then
            echo "Auto-merge enabled on PR #${PR_NUMBER}."
          else
            echo "Could not enable auto-merge on PR #${PR_NUMBER}; leaving it open for manual merge."
          fi
