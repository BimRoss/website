name: Build BimRoss Website Image

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  IMAGE_NAME: geeemoney/bimross-website

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=build,enable=${{ !startsWith(github.ref, 'refs/tags/') }}

      - name: Validate GA measurement ID for tagged releases
        if: startsWith(github.ref, 'refs/tags/')
        env:
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ vars.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
        run: |
          if [ -z "${NEXT_PUBLIC_GA_MEASUREMENT_ID}" ]; then
            echo "NEXT_PUBLIC_GA_MEASUREMENT_ID repository variable is required for tagged builds."
            exit 1
          fi

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            NEXT_PUBLIC_GA_MEASUREMENT_ID=${{ vars.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Ping IndexNow
        if: startsWith(github.ref, 'refs/tags/v')
        continue-on-error: true
        env:
          INDEXNOW_KEY: 741c9ef6851fd271b7341196720ef97d
          SITE_HOST: bimross.com
        run: |
          # IndexNow notifies Bing/Yandex/Naver/Seznam (and via api.indexnow.org,
          # any aggregator that proxies to them) of changed URLs. The key file at
          # https://${SITE_HOST}/${INDEXNOW_KEY}.txt proves ownership.
          # Best-effort — never fail the release on a push hiccup.
          SITEMAP_URLS=$(curl -sS --max-time 10 "https://${SITE_HOST}/sitemap.xml" \
            | grep -oE '<loc>[^<]+</loc>' | sed -E 's,</?loc>,,g')
          if [ -z "${SITEMAP_URLS}" ]; then
            echo "No URLs in sitemap; skipping IndexNow ping."
            exit 0
          fi
          URL_LIST=$(printf '%s\n' ${SITEMAP_URLS} | jq -R . | jq -s .)
          PAYLOAD=$(jq -n \
            --arg host "${SITE_HOST}" \
            --arg key "${INDEXNOW_KEY}" \
            --arg keyLocation "https://${SITE_HOST}/${INDEXNOW_KEY}.txt" \
            --argjson urlList "${URL_LIST}" \
            '{host:$host, key:$key, keyLocation:$keyLocation, urlList:$urlList}')
          echo "Pinging IndexNow with $(echo "${URL_LIST}" | jq 'length') URLs."
          curl -sS -X POST "https://api.indexnow.org/indexnow" \
            --max-time 15 \
            -H "Content-Type: application/json" \
            -d "${PAYLOAD}" \
            -w "\nHTTP %{http_code}\n" || true

  version:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute.outputs.version }}
      target_env: ${{ steps.compute.outputs.target_env }}
      manifest_paths: ${{ steps.compute.outputs.manifest_paths }}
      commit_subject: ${{ steps.compute.outputs.commit_subject }}
    steps:
      - id: compute
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          TARGET=""
          MANIFEST="admin/apps/bimross-website/deployment.yaml"
          SUBJECT="release(bimross-website): bump image to ${VERSION}"
          {
            echo "version=${VERSION}"
            echo "target_env=${TARGET}"
            echo "commit_subject=${SUBJECT}"
            echo 'manifest_paths<<EOF'
            printf '%s\n' "${MANIFEST}"
            echo 'EOF'
          } >> "${GITHUB_OUTPUT}"

  gitops-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-and-publish
      - version
    concurrency:
      group: bimross-website-release
      cancel-in-progress: false
    uses: BimRoss/.github/.github/workflows/gitops-release.yml@91ea84482a8b74acf0f63feebce7187bea0ecc30 # v1
    secrets: inherit
    with:
      app_slug: bimross-website
      version: ${{ needs.version.outputs.version }}
      target_env: ${{ needs.version.outputs.target_env }}
      images: |
        geeemoney/bimross-website
      manifest_paths: ${{ needs.version.outputs.manifest_paths }}
      commit_subject: ${{ needs.version.outputs.commit_subject }}
